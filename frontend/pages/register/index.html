<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Event · Information Technology</title>
  <link rel="stylesheet" href="../../assets/css/styles.css">
</head>
<body>

<nav>
  <a class="nav-brand" href="../events/index.html">
    Event <span class="brand-sub">&nbsp;·&nbsp;Information Technology</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="../events/index.html">Events</a>
    <a class="nav-link active" href="../register/index.html">Register</a>
    <a class="nav-link" href="../participants/index.html">Participants</a>
  </div>
</nav>

<div class="page-wrap">

  <div class="page-title">Register</div>
  <div class="page-sub">กรอกข้อมูลเพื่อลงทะเบียนเข้าร่วมกิจกรรม</div>

  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">ชื่อ-นามสกุล *</label>
        <input class="form-input" id="f-name" type="text" placeholder="เช่น สมชาย ใจดี">
      </div>
      <div class="form-group">
        <label class="form-label">อีเมล *</label>
        <input class="form-input" id="f-email" type="email" placeholder="example@email.com">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">เลือกกิจกรรม *</label>
      <select class="form-select" id="f-event" onchange="updatePreview()">
        <option value="" disabled selected>— กำลังโหลด... —</option>
      </select>
    </div>

    <div class="alert-box" id="reg-preview"></div>
    <div class="alert-box" id="reg-msg" style="margin-top:12px"></div>

    <div style="margin-top:22px">
      <button class="btn btn-primary" id="reg-btn" onclick="submitRegister()">
        ✓&nbsp; Submit
      </button>
    </div>
  </div>

</div>

<div id="toast"></div>

<script src="../../js/api.js"></script>
<script src="index.js"></script>
</body>
</html>
